<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="50%" stop-color="#DFD0B8"/>
      <stop offset="100%" stop-color="#C9B79C"/>
    </linearGradient>
    <linearGradient id="shape1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9B79C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A89276" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="shape2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A88B7E" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Large architectural element -->
  <rect x="60" y="100" width="680" height="500" rx="4" fill="url(#shape1)"/>
  <rect x="100" y="140" width="280" height="420" rx="2" fill="#FAF7F2" opacity="0.5"/>
  <rect x="420" y="140" width="280" height="200" rx="2" fill="#FAF7F2" opacity="0.4"/>
  <rect x="420" y="360" width="130" height="200" rx="2" fill="#FAF7F2" opacity="0.45"/>
  <rect x="570" y="360" width="130" height="200" rx="2" fill="#FAF7F2" opacity="0.35"/>
  <!-- Decorative circle -->
  <circle cx="700" cy="780" r="120" fill="url(#shape2)"/>
  <circle cx="680" cy="760" r="80" fill="#FAF7F2" opacity="0.3"/>
  <!-- Accent lines -->
  <line x1="60" y1="650" x2="740" y2="650" stroke="#C9B79C" stroke-width="2" opacity="0.5"/>
  <line x1="60" y1="660" x2="600" y2="660" stroke="#C9B79C" stroke-width="1" opacity="0.3"/>
  <!-- Slender decorative elements -->
  <rect x="60" y="700" width="3" height="120" fill="#C9B79C" opacity="0.4"/>
  <rect x="70" y="720" width="3" height="100" fill="#C9B79C" opacity="0.25"/>
  <!-- Label -->
  <text x="80" y="870" font-family="Georgia, serif" font-size="14" fill="#8D6E63" opacity="0.7">MODERN ELEGANCE · MANHATTAN</text>
</svg>
