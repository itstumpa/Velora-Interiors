<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="50%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#E8E0D5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B79C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A89276" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Curved display element -->
  <path d="M100 100 Q400 50 700 100 L700 500 Q400 450 100 500 Z" fill="url(#accent)"/>
  <!-- Inner shapes -->
  <circle cx="300" cy="280" r="80" fill="#FAF7F2" opacity="0.5"/>
  <circle cx="500" cy="280" r="60" fill="#FAF7F2" opacity="0.4"/>
  <circle cx="400" cy="400" r="45" fill="#FAF7F2" opacity="0.35"/>
  <!-- Pedestal display -->
  <rect x="340" y="520" width="120" height="10" rx="2" fill="#C9B79C" opacity="0.4"/>
  <line x1="400" y1="530" x2="400" y2="580" stroke="#C9B79C" stroke-width="2" opacity="0.3"/>
  <rect x="360" y="580" width="80" height="80" fill="none" stroke="#C9B79C" stroke-width="1" opacity="0.2"/>
  <!-- Hanging elements -->
  <line x1="200" y1="100" x2="200" y2="160" stroke="#C9B79C" stroke-width="1" opacity="0.3"/>
  <rect x="185" y="160" width="30" height="40" rx="1" fill="#FAF7F2" opacity="0.4"/>
  <line x1="600" y1="100" x2="600" y2="170" stroke="#C9B79C" stroke-width="1" opacity="0.3"/>
  <rect x="585" y="170" width="30" height="50" rx="1" fill="#FAF7F2" opacity="0.4"/>
  <text x="80" y="870" font-family="Georgia, serif" font-size="14" fill="#8D6E63" opacity="0.7">BOUTIQUE SHOWROOM · SOHO</text>
</svg>
