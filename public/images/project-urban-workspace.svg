<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="60%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1F1F1F"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B79C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9B79C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Window grid -->
  <rect x="50" y="80" width="700" height="520" fill="url(#glow)" rx="2"/>
  <line x1="400" y1="80" x2="400" y2="600" stroke="#C9B79C" stroke-width="1" opacity="0.15"/>
  <line x1="50" y1="340" x2="750" y2="340" stroke="#C9B79C" stroke-width="1" opacity="0.15"/>
  <line x1="225" y1="80" x2="225" y2="600" stroke="#C9B79C" stroke-width="1" opacity="0.1"/>
  <line x1="575" y1="80" x2="575" y2="600" stroke="#C9B79C" stroke-width="1" opacity="0.1"/>
  <!-- View/grid pattern -->
  <rect x="80" y="110" width="120" height="200" fill="#C9B79C" opacity="0.08" rx="1"/>
  <rect x="230" y="110" width="140" height="200" fill="#C9B79C" opacity="0.06" rx="1"/>
  <rect x="430" y="110" width="140" height="200" fill="#C9B79C" opacity="0.08" rx="1"/>
  <rect x="600" y="110" width="120" height="200" fill="#C9B79C" opacity="0.06" rx="1"/>
  <!-- Furniture silhouettes -->
  <rect x="100" y="650" width="200" height="30" rx="2" fill="#C9B79C" opacity="0.2"/>
  <rect x="120" y="690" width="160" height="4" fill="#C9B79C" opacity="0.15"/>
  <rect x="500" y="640" width="250" height="40" rx="2" fill="#C9B79C" opacity="0.2"/>
  <rect x="520" y="690" width="210" height="4" fill="#C9B79C" opacity="0.15"/>
  <!-- Accent -->
  <rect x="50" y="750" width="3" height="80" fill="#C9B79C" opacity="0.3"/>
  <text x="70" y="795" font-family="Georgia, serif" font-size="14" fill="#DFD0B8" opacity="0.6">URBAN WORKSPACE · SAN FRANCISCO</text>
</svg>
