<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0D5"/>
      <stop offset="40%" stop-color="#DFD0B8"/>
      <stop offset="100%" stop-color="#C9B79C"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A88B7E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8D6E63" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Horizon line -->
  <rect x="0" y="550" width="800" height="350" fill="url(#sea)"/>
  <!-- Sun/light source -->
  <circle cx="600" cy="400" r="60" fill="#FAF7F2" opacity="0.6"/>
  <circle cx="600" cy="400" r="40" fill="#FAF7F2" opacity="0.8"/>
  <!-- Architecture -->
  <rect x="100" y="300" width="250" height="250" fill="#FAF7F2" opacity="0.7" rx="2"/>
  <rect x="130" y="330" width="90" height="90" fill="#C9B79C" opacity="0.4" rx="1"/>
  <rect x="240" y="330" width="90" height="90" fill="#C9B79C" opacity="0.3" rx="1"/>
  <polygon points="100,300 225,250 350,300" fill="#A89276" opacity="0.5"/>
  <!-- Palm/plant silhouettes -->
  <line x1="500" y1="550" x2="520" y2="380" stroke="#8D6E63" stroke-width="3" opacity="0.3"/>
  <line x1="520" y1="380" x2="480" y2="350" stroke="#8D6E63" stroke-width="2" opacity="0.25"/>
  <line x1="520" y1="380" x2="560" y2="340" stroke="#8D6E63" stroke-width="2" opacity="0.25"/>
  <line x1="520" y1="380" x2="550" y2="370" stroke="#8D6E63" stroke-width="2" opacity="0.2"/>
  <!-- Decorative waves -->
  <path d="M0 600 Q50 590 100 600 Q150 610 200 600 Q250 590 300 600 Q350 610 400 600 Q450 590 500 600 Q550 610 600 600 Q650 590 700 600 Q750 610 800 600" fill="none" stroke="#FAF7F2" stroke-width="1" opacity="0.3"/>
  <path d="M0 620 Q50 615 100 620 Q150 625 200 620 Q250 615 300 620 Q350 625 400 620 Q450 615 500 620 Q550 625 600 620 Q650 615 700 620 Q750 625 800 620" fill="none" stroke="#FAF7F2" stroke-width="1" opacity="0.2"/>
  <text x="80" y="870" font-family="Georgia, serif" font-size="14" fill="#8D6E63" opacity="0.7">COASTAL RETREAT · MALIBU</text>
</svg>
