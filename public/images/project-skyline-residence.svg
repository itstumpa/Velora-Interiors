<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="40%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#C9B79C" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="skyline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FAF7F2" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#C9B79C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FAF7F2" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Window frame (view) -->
  <rect x="100" y="60" width="600" height="580" fill="#1F1F1F"/>
  <rect x="110" y="70" width="580" height="560" fill="url(#skyline)"/>
  <!-- City skyline silhouette -->
  <rect x="120" y="400" width="60" height="230" fill="#1F1F1F" opacity="0.6"/>
  <rect x="190" y="320" width="45" height="310" fill="#1F1F1F" opacity="0.5"/>
  <rect x="245" y="370" width="55" height="260" fill="#1F1F1F" opacity="0.55"/>
  <rect x="310" y="280" width="50" height="350" fill="#1F1F1F" opacity="0.5"/>
  <rect x="370" y="350" width="70" height="280" fill="#1F1F1F" opacity="0.55"/>
  <rect x="450" y="300" width="40" height="330" fill="#1F1F1F" opacity="0.5"/>
  <rect x="500" y="380" width="65" height="250" fill="#1F1F1F" opacity="0.55"/>
  <rect x="575" y="340" width="50" height="290" fill="#1F1F1F" opacity="0.5"/>
  <rect x="635" y="410" width="55" height="220" fill="#1F1F1F" opacity="0.55"/>
  <!-- Window cross -->
  <line x1="400" y1="70" x2="400" y2="630" stroke="#C9B79C" stroke-width="2" opacity="0.15"/>
  <line x1="110" y1="350" x2="690" y2="350" stroke="#C9B79C" stroke-width="1" opacity="0.1"/>
  <!-- Interior reflection -->
  <rect x="120" y="660" width="200" height="4" rx="2" fill="#C9B79C" opacity="0.2"/>
  <rect x="120" y="680" width="150" height="4" rx="2" fill="#C9B79C" opacity="0.15"/>
  <text x="80" y="870" font-family="Georgia, serif" font-size="14" fill="#DFD0B8" opacity="0.6">SKYLINE RESIDENCE · CHICAGO</text>
</svg>
