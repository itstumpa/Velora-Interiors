<svg xmlns="http://www.w3.org/2000/svg" width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="50%" stop-color="#1F1F1F"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9B79C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A89276" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FAF7F2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="900" fill="url(#bg)"/>
  <!-- Grand arch -->
  <rect x="200" y="60" width="400" height="500" fill="url(#warm)" rx="4"/>
  <path d="M200 560 Q400 40 600 560" fill="none" stroke="#C9B79C" stroke-width="2" opacity="0.3"/>
  <!-- Windows -->
  <rect x="250" y="150" width="100" height="150" fill="url(#light)" rx="2"/>
  <rect x="370" y="150" width="60" height="150" fill="url(#light)" rx="2"/>
  <rect x="450" y="150" width="100" height="150" fill="url(#light)" rx="2"/>
  <line x1="300" y1="150" x2="300" y2="300" stroke="#C9B79C" stroke-width="1" opacity="0.2"/>
  <line x1="250" y1="225" x2="350" y2="225" stroke="#C9B79C" stroke-width="1" opacity="0.2"/>
  <!-- Columns -->
  <rect x="230" y="330" width="20" height="230" fill="#C9B79C" opacity="0.15"/>
  <rect x="370" y="330" width="20" height="230" fill="#C9B79C" opacity="0.15"/>
  <rect x="410" y="330" width="20" height="230" fill="#C9B79C" opacity="0.15"/>
  <rect x="550" y="330" width="20" height="230" fill="#C9B79C" opacity="0.15"/>
  <!-- Chandelier suggestion -->
  <line x1="400" y1="60" x2="400" y2="480" stroke="#C9B79C" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="490" r="30" fill="none" stroke="#C9B79C" stroke-width="1" opacity="0.25"/>
  <circle cx="400" cy="490" r="15" fill="#C9B79C" opacity="0.1"/>
  <!-- Floor -->
  <rect x="0" y="560" width="800" height="340" fill="#C9B79C" opacity="0.06"/>
  <text x="80" y="870" font-family="Georgia, serif" font-size="14" fill="#DFD0B8" opacity="0.6">HERITAGE HOTEL · CHARLESTON</text>
</svg>
