<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="50%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#C9B79C" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="100" font-family="Georgia, serif" font-size="18" fill="#C9B79C" text-anchor="middle" opacity="0.5">AFTER</text>
  <!-- Desk area -->
  <rect x="250" y="200" width="300" height="30" rx="2" fill="#C9B79C" opacity="0.3"/>
  <rect x="250" y="230" width="300" height="4" rx="2" fill="#C9B79C" opacity="0.2"/>
  <!-- Chair -->
  <rect x="350" y="260" width="100" height="100" rx="4" fill="#FAF7F2" opacity="0.15"/>
  <!-- Back wall feature -->
  <rect x="100" y="130" width="600" height="50" fill="#C9B79C" opacity="0.12"/>
  <!-- Lighting -->
  <circle cx="400" cy="110" r="15" fill="#FAF7F2" opacity="0.2"/>
  <line x1="400" y1="125" x2="400" y2="200" stroke="#FAF7F2" stroke-width="1" opacity="0.15"/>
  <!-- Plants -->
  <circle cx="650" cy="400" r="30" fill="#C9B79C" opacity="0.15"/>
  <rect x="640" y="430" width="20" height="30" fill="#C9B79C" opacity="0.1"/>
  <!-- Accent line -->
  <rect x="100" y="500" width="600" height="2" fill="#C9B79C" opacity="0.2"/>
  <text x="400" y="555" font-family="sans-serif" font-size="11" fill="#DFD0B8" text-anchor="middle" opacity="0.35">Office · Redesigned</text>
</svg>
