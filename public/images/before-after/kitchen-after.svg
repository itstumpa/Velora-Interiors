<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="60%" stop-color="#C9B79C"/>
      <stop offset="100%" stop-color="#A89276"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="100" font-family="Georgia, serif" font-size="18" fill="#1F1F1F" text-anchor="middle" opacity="0.5">AFTER</text>
  <!-- Counter -->
  <rect x="80" y="280" width="640" height="40" rx="2" fill="#FAF7F2" opacity="0.6"/>
  <!-- Cabinets -->
  <rect x="100" y="130" width="180" height="140" fill="#FAF7F2" opacity="0.5"/>
  <rect x="300" y="130" width="180" height="140" fill="#FAF7F2" opacity="0.45"/>
  <rect x="500" y="130" width="200" height="140" fill="#FAF7F2" opacity="0.4"/>
  <!-- Backsplash -->
  <rect x="80" y="270" width="640" height="50" fill="#C9B79C" opacity="0.2"/>
  <!-- Island -->
  <rect x="280" y="340" width="240" height="120" rx="4" fill="#FAF7F2" opacity="0.5"/>
  <!-- Stools -->
  <rect x="360" y="470" width="30" height="40" fill="#C9B79C" opacity="0.3"/>
  <rect x="410" y="470" width="30" height="40" fill="#C9B79C" opacity="0.25"/>
  <text x="400" y="555" font-family="sans-serif" font-size="11" fill="#1F1F1F" text-anchor="middle" opacity="0.4">Kitchen · Modernized</text>
</svg>
